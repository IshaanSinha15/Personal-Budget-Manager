<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Details | Personal Budget Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/budget.css">
</head>
<body>
    <section class="budget-page" id="budgetModulePage">
        <header class="budget-page-header">
            <div>
                <h1>Budget Details</h1>
                <p>Welcome, <strong id="budgetUserName">User</strong>. Manage and review your complete monthly budget details.</p>
            </div>
            <div class="actions">
                <a href="index.html" class="secondary">Dashboard</a>
                <a href="transactions.html" class="secondary">Transactions</a>
                <button id="logoutBtn" type="button">Logout</button>
            </div>
        </header>

        <section class="budget-layout">
            <article class="budget-form-card">
                <h2>Set Monthly Budget</h2>
                <form id="budgetForm" class="budget-grid" novalidate>
                    <div class="budget-row">
                        <label for="budgetAmount">Monthly Budget Amount</label>
                        <input id="budgetAmount" type="number" min="0.01" step="0.01" placeholder="Enter amount">
                    </div>
                    <div class="budget-actions">
                        <button type="submit">Save Budget</button>
                    </div>
                </form>
                <p id="budgetMessage" class="budget-alert" role="status" aria-live="polite"></p>
            </article>

            <article class="budget-details-card">
                <h2>Budget Overview</h2>
                <div class="budget-details-grid">
                    <div class="detail-item">
                        <span>Total Budget</span>
                        <strong id="totalBudgetDetail">$0.00</strong>
                    </div>
                    <div class="detail-item">
                        <span>Total Spent</span>
                        <strong id="totalSpentDetail">$0.00</strong>
                    </div>
                    <div class="detail-item">
                        <span>Remaining Budget</span>
                        <strong id="remainingBudgetDetail">$0.00</strong>
                    </div>
                    <div class="detail-item">
                        <span>Used (%)</span>
                        <strong id="percentageUsedDetail">0.0%</strong>
                    </div>
                    <div class="detail-item">
                        <span>Status</span>
                        <strong id="budgetStatusDetail">Within Budget</strong>
                    </div>
                    <div class="detail-item">
                        <span>Period</span>
                        <strong id="budgetPeriod">monthly</strong>
                    </div>
                    <div class="detail-item">
                        <span>Budget ID</span>
                        <strong id="budgetId">-</strong>
                    </div>
                    <div class="detail-item">
                        <span>Created At</span>
                        <strong id="budgetCreatedDetail">-</strong>
                    </div>
                    <div class="detail-item">
                        <span>Last Updated</span>
                        <strong id="budgetUpdatedDetail">-</strong>
                    </div>
                </div>
            </article>
        </section>
    </section>

    <script src="js/api.js" defer></script>
    <script src="js/budget.js" defer></script>
</body>
</html>

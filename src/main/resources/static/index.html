<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Personal Budget Manager</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f6f8fc;
            color: #1d2939;
        }

        .dashboard {
            width: min(92vw, 700px);
            background: #ffffff;
            border: 1px solid #d0d5dd;
            border-radius: 14px;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(16, 24, 40, 0.08);
        }

        h1 {
            margin-top: 0;
        }

        .actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        a, button {
            border: 1px solid #1d4ed8;
            background: #1d4ed8;
            color: #ffffff;
            text-decoration: none;
            padding: 0.55rem 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .secondary {
            background: #ffffff;
            color: #1d4ed8;
        }
    </style>
</head>
<body>
    <section class="dashboard">
        <h1>Personal Budget and Expense Manager</h1>
        <p id="welcomeMessage">Welcome to your dashboard.</p>
        <p>This is your frontend root page. Future modules (budgets, transactions, reports) can be added as separate pages and JS files from here.</p>

        <div class="actions">
            <a href="login.html" class="secondary">Go to Login</a>
            <a href="register.html" class="secondary">Go to Register</a>
            <button id="logoutBtn" type="button">Logout</button>
        </div>
    </section>

    <script>
        (function () {
            var userId = localStorage.getItem("userId");
            var userName = localStorage.getItem("userName");
            var welcomeMessage = document.getElementById("welcomeMessage");
            if (welcomeMessage && userId) {
                welcomeMessage.textContent = userName ? ("Welcome, " + userName + " (User ID: " + userId + ")") : ("Welcome back (User ID: " + userId + ")");
            }

            var logoutBtn = document.getElementById("logoutBtn");
            if (logoutBtn) {
                logoutBtn.addEventListener("click", function () {
                    localStorage.removeItem("userId");
                    localStorage.removeItem("userName");
                    localStorage.removeItem("userEmail");
                    window.location.href = "login.html";
                });
            }
        })();
    </script>
</body>
</html>
